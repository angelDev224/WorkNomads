# ─────────────────────────────────────────────────────────────────────────────
# WorkNomads API Gateway — Nginx configuration
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options          DENY;
    add_header X-Content-Type-Options   nosniff;
    add_header X-XSS-Protection         "1; mode=block";
    add_header Referrer-Policy          "strict-origin-when-cross-origin";

    # ── Rate limiting ──────────────────────────────────────────────────────────
    # 10 req/s per IP for auth endpoints (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    # 30 req/s per IP for general API (DoS mitigation)
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;

    # ── File upload size cap ───────────────────────────────────────────────────
    client_max_body_size 12M;

    # ── Upstream service definitions ───────────────────────────────────────────
    upstream auth_service {
        server auth-service:8001;
        keepalive 16;
    }

    upstream submission_service {
        server submission-service:8002;
        keepalive 16;
    }

    upstream admin_service {
        server admin-service:8004;
        keepalive 16;
    }

    # ── Server block ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Auth routes ─────────────────────────────────────────────────────
        location /v1/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            proxy_pass         http://auth_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Submission routes ───────────────────────────────────────────────
        location /v1/submissions {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass         http://submission_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Admin routes (stricter rate limit reuses auth_limit) ────────────
        location /v1/admin/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass         http://admin_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Swagger docs (per-service) ──────────────────────────────────────
        location /auth/docs {
            proxy_pass http://auth_service/docs;
        }
        location /auth/openapi.json {
            proxy_pass http://auth_service/openapi.json;
        }
        location /submissions/docs {
            proxy_pass http://submission_service/docs;
        }
        location /submissions/openapi.json {
            proxy_pass http://submission_service/openapi.json;
        }
        location /admin/docs {
            proxy_pass http://admin_service/docs;
        }
        location /admin/openapi.json {
            proxy_pass http://admin_service/openapi.json;
        }

        # ── Metrics (per-service) ────────────────────────────────────────────
        location /auth/metrics {
            proxy_pass http://auth_service/metrics;
        }
        location /submissions/metrics {
            proxy_pass http://submission_service/metrics;
        }
        location /admin/metrics {
            proxy_pass http://admin_service/metrics;
        }
        location /metrics {
            proxy_pass http://auth_service/metrics;
        }

        # ── Health ─────────────────────────────────────────────────────────
        location /healthz {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }
        location /readyz {
            return 200 '{"status":"ready","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # ── Block anything else ─────────────────────────────────────────────
        location / {
            return 404 '{"detail":"Not found"}';
            add_header Content-Type application/json;
        }

    }
}
