apiVersion: apps/v1
kind: Deployment
metadata:
  name: classifier-service
  namespace: worknomads
  labels:
    app: classifier-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: classifier-service
  template:
    metadata:
      labels:
        app: classifier-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: classifier-service
          image: ghcr.io/YOUR_ORG/worknomads-classifier-service:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: worknomads-config
            - secretRef:
                name: worknomads-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@$(RABBITMQ_HOST):$(RABBITMQ_PORT)/"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
# KEDA ScaledObject — scales classifier-service based on RabbitMQ queue depth
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: classifier-scaledobject
  namespace: worknomads
spec:
  scaleTargetRef:
    name: classifier-service
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    - type: rabbitmq
      metadata:
        host: amqp://worknomads:changeme@rabbitmq-service:5672/
        queueName: classification_tasks
        mode: QueueLength
        value: "5"   # scale up when queue depth > 5 per replica
