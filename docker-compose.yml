version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# WorkNomads — full local stack
# Usage:
#   cp .env.example .env
#   docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-service-env: &service-env
  env_file: .env
  restart: unless-stopped
  logging: *default-logging

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
  public:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    <<: *service-env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-worknomads}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-worknomads}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-worknomads}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    <<: *service-env
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    <<: *service-env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-worknomads}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - internal
    ports:
      - "15672:15672"   # management UI — dev only
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    <<: *service-env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - internal
    ports:
      - "9000:9000"     # object API (presigned URLs from browser)
      - "9001:9001"     # console UI — dev only
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── MinIO bucket initialiser (runs once then exits) ──────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - internal
    env_file: .env
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/$${MINIO_BUCKET};
        mc anonymous set download local/$${MINIO_BUCKET};
        echo 'MinIO bucket ready';
      "

  # ── Application services ────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  submission-service:
    build:
      context: ./services/submission-service
      dockerfile: Dockerfile
    <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  classifier-service:
    build:
      context: ./services/classifier-service
      dockerfile: Dockerfile
    <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal

  admin-service:
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile
    <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── API Gateway (public entry point) ────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    <<: *service-env
    depends_on:
      - auth-service
      - submission-service
      - admin-service
    networks:
      - internal
      - public
    ports:
      - "80:80"
